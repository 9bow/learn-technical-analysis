<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <style>
    .label { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 12px; }
    .label-sm { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 10px; }
    .title { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; }
    .peak-label { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 700; }

    .bg { fill: #ffffff; }
    .text { fill: #374151; }
    .text-muted { fill: #6b7280; }
    .axis { stroke: #d1d5db; stroke-width: 1; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .text { fill: #e2e8f0; }
      .text-muted { fill: #94a3b8; }
      .axis { stroke: #334155; }
    }
  </style>

  <rect width="800" height="460" class="bg" rx="8"/>
  <text x="400" y="32" text-anchor="middle" class="title text">헤드앤숄더 패턴 (Head &amp; Shoulders)</text>

  <g transform="translate(60, 50)">

    <!-- Pattern path -->
    <!-- Start → Left Shoulder → Neckline dip → Head → Neckline dip → Right Shoulder → Breakdown -->
    <polyline
      points="20,280 60,280 110,160 160,230 230,80 300,230 350,165 400,230 450,280 560,360 620,340"
      fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Neckline: connect the two troughs (160,230) and (400,230) -->
    <line x1="100" y1="233" x2="550" y2="260" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,5"/>

    <!-- Neckline label -->
    <text x="555" y="263" class="peak-label" fill="#ef4444">넥라인 (Neckline)</text>

    <!-- Left Shoulder peak at (110,160) -->
    <circle cx="110" cy="160" r="5" fill="#6b7280"/>
    <text x="110" y="145" text-anchor="middle" class="peak-label text">왼쪽 어깨</text>
    <text x="110" y="157" text-anchor="middle" class="label-sm text-muted">(Left Shoulder)</text>

    <!-- Head peak at (230,80) -->
    <circle cx="230" cy="80" r="5" fill="#3b82f6"/>
    <text x="230" y="65" text-anchor="middle" class="peak-label" fill="#3b82f6">머리 (Head)</text>

    <!-- Right Shoulder peak at (350,165) -->
    <circle cx="350" cy="165" r="5" fill="#6b7280"/>
    <text x="350" y="150" text-anchor="middle" class="peak-label text">오른쪽 어깨</text>
    <text x="350" y="162" text-anchor="middle" class="label-sm text-muted">(Right Shoulder)</text>

    <!-- Volume bars (decreasing at each peak) -->
    <!-- Left Shoulder volume -->
    <rect x="95" y="320" width="14" height="50" fill="#6b7280" opacity="0.5" rx="2"/>
    <!-- Head volume -->
    <rect x="215" y="330" width="14" height="38" fill="#3b82f6" opacity="0.5" rx="2"/>
    <!-- Right Shoulder volume (smallest) -->
    <rect x="335" y="344" width="14" height="24" fill="#6b7280" opacity="0.4" rx="2"/>
    <!-- Volume label -->
    <text x="230" y="390" text-anchor="middle" class="label-sm text-muted">거래량 (Volume) — 각 봉우리마다 감소</text>

    <!-- Breakdown arrow -->
    <line x1="490" y1="248" x2="490" y2="285" stroke="#ef4444" stroke-width="2"/>
    <polygon points="490,285 486,275 494,275" fill="#ef4444"/>
    <text x="500" y="270" class="label-sm" fill="#ef4444">돌파</text>

    <!-- Measured move target -->
    <!-- Distance from head to neckline ≈ 150px, project downward from breakdown -->
    <line x1="490" y1="253" x2="490" y2="400" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>
    <line x1="470" y1="400" x2="510" y2="400" stroke="#ef4444" stroke-width="2"/>
    <text x="515" y="404" class="label" fill="#ef4444">목표가 (Target)</text>

    <!-- Brace for measured move -->
    <line x1="234" y1="80" x2="234" y2="233" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="244" y="158" class="label-sm" fill="#3b82f6">측정</text>
    <text x="244" y="169" class="label-sm" fill="#3b82f6">거리</text>

    <!-- Axis -->
    <line x1="0" y1="410" x2="650" y2="410" class="axis"/>
    <line x1="0" y1="50" x2="0" y2="410" class="axis"/>

    <!-- Y label -->
    <text x="-10" y="230" text-anchor="middle" class="label text-muted" transform="rotate(-90,-10,230)">가격 (Price)</text>
    <text x="325" y="428" text-anchor="middle" class="label text-muted">시간 (Time)</text>

    <!-- Bear signal box -->
    <rect x="470" y="140" width="175" height="52" fill="#ef4444" opacity="0.1" rx="4"/>
    <rect x="470" y="140" width="175" height="52" fill="none" stroke="#ef4444" stroke-width="1.5" rx="4"/>
    <text x="557" y="156" text-anchor="middle" class="label" fill="#ef4444">하락 반전 신호</text>
    <text x="557" y="170" text-anchor="middle" class="label-sm" fill="#ef4444">Bearish Reversal Signal</text>
    <text x="557" y="184" text-anchor="middle" class="label-sm text-muted">넥라인 돌파 시 확인</text>
  </g>
</svg>
