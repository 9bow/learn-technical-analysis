<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <style>
    .label { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 12px; }
    .label-sm { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 10px; }
    .title { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; }
    .wave-num { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 800; }
    .rule { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 10px; }

    .bg { fill: #ffffff; }
    .text { fill: #374151; }
    .text-muted { fill: #6b7280; }
    .rule-bg { fill: #f9fafb; }
    .rule-border { stroke: #e5e7eb; }
    .axis { stroke: #d1d5db; stroke-width: 1; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .text { fill: #e2e8f0; }
      .text-muted { fill: #94a3b8; }
      .rule-bg { fill: #1e293b; }
      .rule-border { stroke: #334155; }
      .axis { stroke: #334155; }
    }
  </style>

  <rect width="900" height="500" class="bg" rx="8"/>
  <text x="450" y="30" text-anchor="middle" class="title text">엘리어트 파동 구조 (Elliott Wave Structure)</text>

  <g transform="translate(40, 50)">

    <!-- Wave points (impulse: 1-2-3-4-5) -->
    <!-- 0:(20,300) 1:(100,140) 2:(160,220) 3:(280,60) 4:(360,160) 5:(460,40) -->
    <!-- Correction: A:(530,190) B:(590,120) C:(680,300) -->

    <!-- Impulse wave (blue) -->
    <polyline
      points="20,300 100,140 160,220 280,60 360,160 460,40"
      fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>

    <!-- Correction wave (orange/red) -->
    <polyline
      points="460,40 530,190 590,120 680,300"
      fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>

    <!-- Wave nodes (impulse) -->
    <circle cx="20" cy="300" r="6" fill="#3b82f6"/>
    <circle cx="100" cy="140" r="6" fill="#3b82f6"/>
    <circle cx="160" cy="220" r="6" fill="#3b82f6"/>
    <circle cx="280" cy="60" r="6" fill="#3b82f6"/>
    <circle cx="360" cy="160" r="6" fill="#3b82f6"/>
    <circle cx="460" cy="40" r="6" fill="#3b82f6"/>

    <!-- Wave nodes (correction) -->
    <circle cx="530" cy="190" r="6" fill="#ef4444"/>
    <circle cx="590" cy="120" r="6" fill="#ef4444"/>
    <circle cx="680" cy="300" r="6" fill="#ef4444"/>

    <!-- Wave number labels (impulse) -->
    <text x="100" y="126" text-anchor="middle" class="wave-num" fill="#3b82f6">1</text>
    <text x="160" y="244" text-anchor="middle" class="wave-num" fill="#3b82f6">2</text>
    <text x="280" y="46" text-anchor="middle" class="wave-num" fill="#3b82f6">3</text>
    <text x="360" y="184" text-anchor="middle" class="wave-num" fill="#3b82f6">4</text>
    <text x="460" y="26" text-anchor="middle" class="wave-num" fill="#3b82f6">5</text>

    <!-- Wave letter labels (correction) -->
    <text x="530" y="210" text-anchor="middle" class="wave-num" fill="#ef4444">A</text>
    <text x="590" y="106" text-anchor="middle" class="wave-num" fill="#ef4444">B</text>
    <text x="680" y="320" text-anchor="middle" class="wave-num" fill="#ef4444">C</text>

    <!-- Wave segment labels -->
    <!-- Midpoints of each segment -->
    <text x="56" y="222" text-anchor="middle" class="label-sm text-muted">충격파</text>
    <text x="130" y="190" text-anchor="middle" class="label-sm text-muted">조정파</text>
    <text x="218" y="130" text-anchor="middle" class="label-sm text-muted">충격파</text>
    <text x="320" y="118" text-anchor="middle" class="label-sm text-muted">조정파</text>
    <text x="410" y="93" text-anchor="middle" class="label-sm text-muted">충격파</text>

    <!-- Bracket: Impulse waves label -->
    <line x1="20" y1="340" x2="460" y2="340" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="20" y1="335" x2="20" y2="345" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="460" y1="335" x2="460" y2="345" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="240" y="357" text-anchor="middle" class="label" fill="#3b82f6">5파 충격 (Impulse)</text>

    <!-- Bracket: Correction waves label -->
    <line x1="460" y1="340" x2="680" y2="340" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="460" y1="335" x2="460" y2="345" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="680" y1="335" x2="680" y2="345" stroke="#ef4444" stroke-width="1.5"/>
    <text x="570" y="357" text-anchor="middle" class="label" fill="#ef4444">3파 조정 (Correction)</text>

    <!-- Axis -->
    <line x1="0" y1="320" x2="720" y2="320" class="axis"/>

    <!-- Rules box -->
    <rect x="0" y="370" width="720" height="105" class="rule-bg" rx="6"/>
    <rect x="0" y="370" width="720" height="105" fill="none" class="rule-border" stroke-width="1" rx="6"/>
    <text x="360" y="388" text-anchor="middle" class="label text" font-weight="600">엘리어트 파동 3가지 규칙 (Three Rules)</text>
    <text x="12" y="408" class="rule text">① 파동 2는 파동 1의 시작점 아래로 내려가지 않는다 (Wave 2 never retraces more than 100% of Wave 1)</text>
    <text x="12" y="428" class="rule text">② 파동 3은 충격파 중 가장 짧지 않다 (Wave 3 is never the shortest impulse wave)</text>
    <text x="12" y="448" class="rule text">③ 파동 4는 파동 1의 가격 영역에 진입하지 않는다 (Wave 4 never enters Wave 1's price territory)</text>

    <!-- Rule violation indicators on chart -->
    <!-- Rule 1: Wave 2 does not go below Wave 1 start (20,300) -->
    <line x1="20" y1="300" x2="160" y2="300" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
    <!-- Rule 3: Wave 4 does not enter Wave 1 territory (100,140) -->
    <line x1="100" y1="140" x2="360" y2="140" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 478)">
    <line x1="0" y1="5" x2="24" y2="5" stroke="#3b82f6" stroke-width="3"/>
    <text x="30" y="9" class="label-sm text">충격 파동 (Impulse Wave)</text>
    <line x1="200" y1="5" x2="224" y2="5" stroke="#ef4444" stroke-width="3"/>
    <text x="230" y="9" class="label-sm text">조정 파동 (Corrective Wave)</text>
  </g>
</svg>
